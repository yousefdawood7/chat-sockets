<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Real-time chat application" />
    <title>Chat</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script defer src="scripts/chat.js" type="module"></script>
  </head>
  <body>
    <div class="chat-container" id="chatContainer">
      <header class="chat-header" id="chatHeader">
        <div class="header-avatar">
          <div class="avatar-circle">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
          <div class="header-info">
            <h1 class="header-name" id="headerName">Chat Room</h1>
            <span class="header-status" id="headerStatus">
              <span class="status-dot"></span>
              Online
            </span>
          </div>
        </div>
      </header>

      <!-- Messages Area -->
      <main class="chat-messages" id="chatMessages">
        <div class="message sent"></div>
        <div class="message received"></div>
      </main>

      <!-- Input Area -->
      <footer class="chat-input-area" id="chatInputArea">
        <div class="input-wrapper">
          <textarea
            class="message-input"
            id="messageInput"
            placeholder="Type a message..."
            rows="1"
            aria-label="Message input"
          ></textarea>
          <button
            class="send-btn"
            id="sendBtn"
            aria-label="Send message"
            disabled
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </div>
      </footer>
    </div>
  </body>
</html>
